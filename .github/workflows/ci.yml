name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'
  CI: 'true'
  PRIMANOTA_SKIP_DB_INIT: 'true'

jobs:
  build-and-test:
    name: Build, analyzers, tests
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET (respect global.json)
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore (locked mode)
        run: dotnet restore PrimaNota.slnx --locked-mode

      - name: Verify formatting
        run: dotnet format PrimaNota.slnx --verify-no-changes --no-restore

      - name: Build (Release, warnings-as-errors)
        run: dotnet build PrimaNota.slnx --configuration Release --no-restore

      - name: Unit tests
        run: >-
          dotnet test tests/PrimaNota.UnitTests
          --configuration Release --no-build
          --logger "trx;LogFileName=unit.trx"
          --collect:"XPlat Code Coverage"
          --results-directory test-results

      - name: Component tests
        run: >-
          dotnet test tests/PrimaNota.ComponentTests
          --configuration Release --no-build
          --logger "trx;LogFileName=component.trx"
          --results-directory test-results

      - name: Integration tests (Testcontainers → SQL Server)
        run: >-
          dotnet test tests/PrimaNota.IntegrationTests
          --configuration Release --no-build
          --logger "trx;LogFileName=integration.trx"
          --results-directory test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results
          retention-days: 14

  security-scan:
    name: Dependency vulnerability scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET (respect global.json)
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore PrimaNota.slnx --locked-mode

      - name: Scan vulnerable packages (direct + transitive)
        run: |
          set -e
          OUT=$(dotnet list PrimaNota.slnx package --vulnerable --include-transitive 2>&1 || true)
          echo "$OUT"
          if echo "$OUT" | grep -Eiq "High|Critical"; then
            echo "::error::High or Critical CVE detected in dependency tree."
            exit 1
          fi

      - name: Scan deprecated packages
        run: dotnet list PrimaNota.slnx package --deprecated --include-transitive || true

  codeql:
    name: CodeQL static analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET (respect global.json)
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Init CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp
          queries: security-and-quality

      - name: Restore
        run: dotnet restore PrimaNota.slnx --locked-mode

      - name: Build (Release)
        run: dotnet build PrimaNota.slnx --configuration Release --no-restore

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:csharp
