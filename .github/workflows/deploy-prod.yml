name: "Build & Deploy · Prod"

# Manual-only deploy to production. Identical to the dev workflow except it never
# runs automatically: an operator triggers it from the Actions tab. Build/publish
# on a GitHub-hosted runner, then deploy to IIS on the self-hosted runner of the
# prod server (label "prod"). Environment-scoped variables (environment: prod)
# resolve the same vars.* names to production values.
on:
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'

jobs:
  build:
    name: Build & Publish
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET (respect global.json)
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore (locked mode)
        run: dotnet restore PrimaNota.slnx --locked-mode

      - name: Build (Release)
        run: dotnet build PrimaNota.slnx --configuration Release --no-restore

      - name: Publish PrimaNota.Web (framework-dependent, portable)
        run: >-
          dotnet publish src/PrimaNota.Web/PrimaNota.Web.csproj
          --configuration Release
          --no-build
          --output publish

      - name: Stage IIS web.config (ASPNETCORE_ENVIRONMENT=Production)
        run: |
          cp deploy/iis/web.config publish/web.config
          sed -i 's#\(name="ASPNETCORE_ENVIRONMENT" value="\)[^"]*#\1Production#' publish/web.config

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: primanota-web-prod
          path: publish
          retention-days: 3

  deploy:
    name: Deploy to IIS
    needs: build
    runs-on: [self-hosted, prod]
    environment: prod
    timeout-minutes: 20
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: primanota-web-prod
          path: ./publish

      - name: Stop IIS site and app pool
        shell: powershell
        run: |
          Import-Module WebAdministration

          $siteName = "${{ vars.IIS_PRIMANOTA_SITE_NAME }}"

          # Stop the website.
          $site = Get-Website -Name $siteName -ErrorAction SilentlyContinue
          if ($site) {
              Stop-Website -Name $siteName
              Write-Host "Stopped site: $siteName"
          } else {
              Write-Host "WARNING: site '$siteName' not found."
          }

          # Stop the application pool to release file locks held by w3wp.exe.
          $appPools = @()
          if ($site -and $site.applicationPool) {
              $poolName = $site.applicationPool
              $appPools += $poolName
              $pool = Get-WebAppPoolState -Name $poolName -ErrorAction SilentlyContinue
              if ($pool -and $pool.Value -ne 'Stopped') {
                  Stop-WebAppPool -Name $poolName
                  Write-Host "Stopped app pool: $poolName"
              }
          }

          # Wait for the worker processes to fully exit before copying.
          $timeout = 30
          $elapsed = 0
          while ($elapsed -lt $timeout) {
              $running = Get-ChildItem "IIS:\AppPools" | Where-Object {
                  $_.Name -in $appPools -and $_.State -ne 'Stopped'
              }
              if (-not $running) { break }
              Start-Sleep -Seconds 2
              $elapsed += 2
              Write-Host "Waiting for app pools to stop... ($elapsed s)"
          }

          Start-Sleep -Seconds 3
          Write-Host "App pool stopped, file locks released."

      - name: Deploy files (preserve persistent data and env-specific settings)
        shell: powershell
        run: |
          $dest = "${{ vars.IIS_PRIMANOTA_PHYSICAL_PATH }}"
          if (!(Test-Path $dest)) { New-Item -ItemType Directory -Path $dest -Force | Out-Null }

          # /MIR mirrors the published output into the site folder.
          # Exclusions:
          #   /XF appsettings.Production.json appsettings.Staging.json
          #       -> server environment configs (with secrets) are NEVER overwritten.
          #          appsettings.json IS overwritten with the build output.
          #   /XD attachments logs
          #       -> persistent uploads (Attachments:RootPath) and Serilog files,
          #          both relative to the site root, are preserved across deploys.
          robocopy .\publish $dest /MIR /R:3 /W:10 /NFL /NDL /NJH /NJS /NC /NS /NP `
            /XF appsettings.Production.json appsettings.Staging.json `
            /XD attachments logs

          # robocopy exit codes 0-7 indicate success (1 = files copied).
          if ($LASTEXITCODE -le 7) { $global:LASTEXITCODE = 0 }
          Write-Host "Files synced to $dest."

      - name: Start IIS app pool and site
        shell: powershell
        run: |
          Import-Module WebAdministration

          $siteName = "${{ vars.IIS_PRIMANOTA_SITE_NAME }}"
          $site = Get-Website -Name $siteName -ErrorAction SilentlyContinue

          # Start the application pool first, then the site.
          if ($site -and $site.applicationPool) {
              $poolName = $site.applicationPool
              $pool = Get-WebAppPoolState -Name $poolName -ErrorAction SilentlyContinue
              if ($pool -and $pool.Value -eq 'Stopped') {
                  Start-WebAppPool -Name $poolName
                  Write-Host "Started app pool: $poolName"
              }
          }

          if ($site) {
              Start-Website -Name $siteName
              Write-Host "Started site: $siteName"
          }

          Write-Host "IIS site and app pool started."

      # Schema creation/upgrade runs inside the app at startup
      # (Program.cs -> InitializeInfrastructureAsync -> Database.MigrateAsync),
      # so the first request after deploy waits for migrations to finish.
      - name: Smoke test /health (post-deploy + auto-migration)
        if: ${{ vars.PRIMANOTA_HEALTH_URL != '' }}
        shell: powershell
        env:
          HEALTH_URL: ${{ vars.PRIMANOTA_HEALTH_URL }}
        run: |
          for ($i = 1; $i -le 20; $i++) {
              try {
                  $resp = Invoke-WebRequest -Uri $env:HEALTH_URL -UseBasicParsing -TimeoutSec 15
                  if ($resp.StatusCode -eq 200) {
                      Write-Host "Health OK (attempt $i)"
                      exit 0
                  }
              } catch {
                  Write-Host "Attempt $i failed: $_"
              }
              Start-Sleep -Seconds 6
          }
          Write-Error "Health check did not recover within timeout. Check the app pool / Windows Event Log for migration errors."
          exit 1

      - name: Cleanup artifact files
        if: always()
        shell: powershell
        run: |
          if (Test-Path .\publish) { Remove-Item -Recurse -Force .\publish }
