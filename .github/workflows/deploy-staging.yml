name: Deploy · Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'

jobs:
  publish:
    name: Publish artifact
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore PrimaNota.slnx --locked-mode

      - name: Build (Release)
        run: dotnet build PrimaNota.slnx --configuration Release --no-restore

      - name: Publish PrimaNota.Web
        run: >-
          dotnet publish src/PrimaNota.Web/PrimaNota.Web.csproj
          --configuration Release
          --no-build
          --output publish
          --runtime win-x64
          --self-contained false

      - name: Copy IIS web.config override
        run: cp deploy/iis/web.config publish/web.config

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: primanota-web-staging
          path: publish
          retention-days: 14

  deploy:
    name: Deploy to IIS staging
    needs: publish
    runs-on: windows-latest
    environment: staging
    timeout-minutes: 20
    if: ${{ vars.STAGING_IIS_HOST != '' }}

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: primanota-web-staging
          path: publish

      - name: WebDeploy to IIS
        shell: pwsh
        env:
          IIS_HOST: ${{ vars.STAGING_IIS_HOST }}
          IIS_SITE: ${{ vars.STAGING_IIS_SITE }}
          IIS_USER: ${{ secrets.STAGING_IIS_USER }}
          IIS_PASS: ${{ secrets.STAGING_IIS_PASS }}
        run: |
          $msdeploy = "C:\Program Files\IIS\Microsoft Web Deploy V3\msdeploy.exe"
          & $msdeploy `
            -verb:sync `
            -source:contentPath="publish" `
            -dest:contentPath="$env:IIS_SITE",computerName="https://$env:IIS_HOST:8172/msdeploy.axd?site=$env:IIS_SITE",username="$env:IIS_USER",password="$env:IIS_PASS",authtype="Basic" `
            -allowUntrusted

      # Schema creation / upgrade runs inside the app itself:
      # PrimaNota.Web.Program.cs invokes InitializeInfrastructureAsync()
      # which calls DbContext.Database.MigrateAsync() at startup.
      # The first HTTP request after deploy therefore waits for migrations
      # to complete — that's why the smoke test polls /health with retries.

      - name: Smoke test /health (post-deploy + auto-migration)
        shell: pwsh
        env:
          HEALTH_URL: https://${{ vars.STAGING_HOSTNAME }}/health
        run: |
          for ($i = 1; $i -le 20; $i++) {
            try {
              $resp = Invoke-WebRequest -Uri $env:HEALTH_URL -UseBasicParsing -TimeoutSec 15
              if ($resp.StatusCode -eq 200) {
                Write-Host "Health OK (attempt $i)"
                exit 0
              }
            } catch {
              Write-Host "Attempt $i failed: $_"
            }
            Start-Sleep -Seconds 6
          }
          Write-Error "Health check did not recover within timeout. Check the app pool logs for migration errors."
          exit 1
