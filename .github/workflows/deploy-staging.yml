name: Deploy · Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
  PRIMANOTA_SKIP_DB_INIT: 'true'

jobs:
  publish:
    name: Publish artifact
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore PrimaNota.slnx --locked-mode

      - name: Build (Release)
        run: dotnet build PrimaNota.slnx --configuration Release --no-restore

      - name: Publish PrimaNota.Web
        run: >-
          dotnet publish src/PrimaNota.Web/PrimaNota.Web.csproj
          --configuration Release
          --no-build
          --output publish
          --runtime win-x64
          --self-contained false

      - name: Generate deployment SQL
        run: |
          dotnet tool restore
          dotnet ef migrations script \
            --project src/PrimaNota.Infrastructure \
            --startup-project src/PrimaNota.Web \
            --output publish/migrations.sql \
            --idempotent

      - name: Copy IIS web.config override
        run: cp deploy/iis/web.config publish/web.config

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: primanota-web-staging
          path: publish
          retention-days: 14

  deploy:
    name: Deploy to IIS staging
    needs: publish
    runs-on: windows-latest
    environment: staging
    timeout-minutes: 20
    if: ${{ vars.STAGING_IIS_HOST != '' }}

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: primanota-web-staging
          path: publish

      - name: Apply DB migrations (idempotent script via sqlcmd)
        shell: pwsh
        env:
          DB_SERVER:   ${{ vars.STAGING_DB_SERVER }}
          DB_NAME:     ${{ vars.STAGING_DB_NAME }}
          DB_USER:     ${{ secrets.STAGING_DB_USER }}
          DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
        run: |
          foreach ($pair in @(
              @{ Name = 'STAGING_DB_SERVER (variable)';  Value = $env:DB_SERVER   },
              @{ Name = 'STAGING_DB_NAME (variable)';    Value = $env:DB_NAME     },
              @{ Name = 'STAGING_DB_USER (secret)';      Value = $env:DB_USER     },
              @{ Name = 'STAGING_DB_PASSWORD (secret)';  Value = $env:DB_PASSWORD }
          )) {
              if ([string]::IsNullOrWhiteSpace($pair.Value)) {
                  Write-Error "$($pair.Name) is not configured on the staging environment."
                  exit 1
              }
          }
          sqlcmd -S "$env:DB_SERVER" -d "$env:DB_NAME" `
                 -U "$env:DB_USER" -P "$env:DB_PASSWORD" `
                 -N -C `
                 -b -i publish/migrations.sql

      - name: WebDeploy to IIS
        shell: pwsh
        env:
          IIS_HOST: ${{ vars.STAGING_IIS_HOST }}
          IIS_SITE: ${{ vars.STAGING_IIS_SITE }}
          IIS_USER: ${{ secrets.STAGING_IIS_USER }}
          IIS_PASS: ${{ secrets.STAGING_IIS_PASS }}
        run: |
          $msdeploy = "C:\Program Files\IIS\Microsoft Web Deploy V3\msdeploy.exe"
          & $msdeploy `
            -verb:sync `
            -source:contentPath="publish" `
            -dest:contentPath="$env:IIS_SITE",computerName="https://$env:IIS_HOST:8172/msdeploy.axd?site=$env:IIS_SITE",username="$env:IIS_USER",password="$env:IIS_PASS",authtype="Basic" `
            -allowUntrusted

      - name: Smoke test /health
        shell: pwsh
        env:
          HEALTH_URL: https://${{ vars.STAGING_HOSTNAME }}/health
        run: |
          for ($i = 1; $i -le 10; $i++) {
            try {
              $resp = Invoke-WebRequest -Uri $env:HEALTH_URL -UseBasicParsing -TimeoutSec 10
              if ($resp.StatusCode -eq 200) {
                Write-Host "Health OK (attempt $i)"
                exit 0
              }
            } catch {
              Write-Host "Attempt $i failed: $_"
            }
            Start-Sleep -Seconds 5
          }
          Write-Error "Health check did not recover within timeout."
          exit 1
